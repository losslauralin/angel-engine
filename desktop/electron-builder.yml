appId: com.akrc.angel-engine
productName: Angel Engine
artifactName: Angel-Engine-${version}-${arch}.${ext}
directories:
  output: out/builder
files: []
extraResources:
  - from: build/app-update.yml
    to: app-update.yml
artifactBuildCompleted: scripts/notarize-dmg-artifact.cjs
mac:
  category: public.app-category.developer-tools
  notarize: true
  icon: assets/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
dmg:
  sign: true
  writeUpdateInfo: false
win:
  icon: assets/icon.png
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: Angel-Engine-${version}-${arch}-setup.${ext}
portable:
  artifactName: Angel-Engine-${version}-${arch}-portable.${ext}
linux:
  icon: assets/icon.png
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
appImage:
  artifactName: Angel-Engine-${version}-${arch}.${ext}
publish:
  provider: github
  releaseType: release
