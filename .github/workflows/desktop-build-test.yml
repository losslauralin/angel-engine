name: Desktop Build Test

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Runner OS"
        required: false
        default: windows-latest
        type: choice
        options:
          - windows-latest
          - ubuntu-latest

permissions:
  contents: read

jobs:
  build:
    name: Build desktop app (${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app (no publish)
        run: pnpm --filter desktop run make

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-build-${{ inputs.os }}
          path: desktop/out/builder/**
          if-no-files-found: error
